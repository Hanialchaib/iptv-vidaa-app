<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPTV Ultra PRO X - TV Edition</title>
  <link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<style>
/* تصميم حضاري يتناسب مع شاشات التلفزيون */
body { margin:0; font-family:Arial, sans-serif; background:#0b0f2a; color:white; overflow:hidden; width: 100vw; height: 100vh; }
#login, #app { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width: 100vw; }

/* تنسيق حقول الإدخال والأزرار */
input, button { margin:5px; padding:15px; width:300px; font-size: 1.2em; border-radius: 8px; outline: none; }
input { background:#0f172a; border:2px solid #334155; color:white; }
button { background:#2563eb; border:none; color:white; cursor:pointer; font-weight: bold; }

/* أهم جزء للتلفزيون: تنسيق العنصر المحدد (Focus) عبر الريموت */
input:focus, button:focus, .focusable:focus, .channel:focus {
    outline: 4px solid #facc15 !important;
    box-shadow: 0 0 15px #facc15;
    transform: scale(1.05);
    background: #1e293b;
    z-index: 10;
}

#app { display:none; height:100vh; flex-direction:row; }
.sidebar { width:250px; background:#020617; display:flex; flex-direction:column; padding-top: 20px; }
.sidebar div { padding:20px; cursor:pointer; border-bottom:1px solid #1e293b; font-size: 1.2em; outline: none; }

.content { flex:1; display:flex; flex-direction:column; padding: 10px; }
.topbar { background:#020617; padding:15px; display:flex; gap:10px; align-items:center; border-radius: 10px; margin-bottom: 10px;}
.topbar input { flex:1; padding:10px; font-size: 1.1em; width: auto; }
.topbar span { padding:10px; background:#1e293b; border-radius:5px; font-size: 1.1em; }

#channels { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:15px; padding:10px; }
.channel { display:flex; flex-direction:column; align-items:center; cursor:pointer; background:#0f172a; padding:10px; border-radius:8px; transition:0.2s; outline: none; border: 2px solid transparent; }
.channel img { width:100%; height:100px; border-radius:5px; object-fit:contain; background: #000; }
.channel span { margin-top:10px; text-align:center; font-size:1em; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }

video { width:100%; height:45vh; background:black; margin-top:10px; border-radius:10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.control-panel { display:flex; gap:10px; margin-top:10px; justify-content: center; }
button.small { padding:10px 20px; width:auto; font-size: 1em; }

/* إخفاء شريط التمرير الافتراضي لجمالية التلفزيون */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #020617; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
</style>
</head>
<body>

<div id="login">
    <h2>IPTV Ultra PRO X</h2>
    <input id="host" placeholder="Host / Server" tabindex="0">
    <input id="user" placeholder="Username" tabindex="0">
    <input id="pass" type="password" placeholder="Password" tabindex="0">
    <button onclick="xtreamLogin()" tabindex="0">Login</button>
    
    <h3>أو M3U</h3>
    <input id="m3u" placeholder="رابط M3U" tabindex="0">
    <button id="m3uLoad" onclick="loadM3U()" tabindex="0">تحميل M3U</button>
</div>

<div id="app">
    <div class="sidebar">
        <div tabindex="0" class="focusable" onclick="loadLive()">📺 Live</div>
        <div tabindex="0" class="focusable" onclick="loadMovies()">🎬 Movies</div>
        <div tabindex="0" class="focusable" onclick="loadSeries()">📺 Series</div>
        <div tabindex="0" class="focusable" onclick="refreshAccount()">🔄 تحديث الحساب</div>
    </div>

    <div class="content">
        <div class="topbar">
            <input id="search" placeholder="Search Channels..." tabindex="0" onkeyup="searchAll()">
            <span id="accountInfo">Info: –</span>
        </div>
        
        <video id="video" controls autoplay tabindex="0"></video>
        
        <div class="control-panel">
            <button class="small" tabindex="0" onclick="changeQuality('auto')">Auto</button>
            <button class="small" tabindex="0" onclick="changeQuality('hd')">HD</button>
            <button class="small" tabindex="0" onclick="changeQuality('sd')">SD</button>
            <button class="small" tabindex="0" onclick="muteToggle()">🔇</button>
        </div>

        <div id="channels"></div>
    </div>
</div>

<script>
// دعم أزرار الريموت كنترول (التنقل والنقر)
document.addEventListener('keydown', function(e) {
    // إذا ضغط المستخدم على زر OK / Enter (الكود 13) في الريموت
    if(e.key === 'Enter' || e.keyCode === 13) {
        // إذا كان العنصر الحالي المحدد ليس حقل إدخال (حتى لا نمنع لوحة المفاتيح)، قم بتنفيذ النقر
        if (document.activeElement.tagName !== 'INPUT') {
            document.activeElement.click();
        }
    }
    // يمكن هنا إضافة أكواد أزرار التشغيل/الإيقاف أو زر العودة الخاص بـ VIDAA
});

// إعطاء التركيز التلقائي لأول حقل إدخال عند فتح التطبيق
window.onload = function() {
    document.getElementById('host').focus();
};

let liveChannels=[], movies=[], series=[], currentQuality='auto';
const proxy="https://corsproxy.io/?";
let host="", user="", pass="";

function updateAccountInfo(){
    document.getElementById('accountInfo').textContent=`Host: ${host} | User: ${user}`;
}

async function xtreamLogin(){
    host=document.getElementById("host").value.trim();
    user=document.getElementById("user").value.trim();
    pass=document.getElementById("pass").value.trim();
    if(!host.startsWith("http") && host !== ""){host="http://"+host;}
    updateAccountInfo();
    try{
        let api=`${host}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;
        let res=await fetch(proxy+api);
        let data=await res.json();
        liveChannels=[];
        data.forEach(c=>{liveChannels.push({name:c.name,logo:c.stream_icon,url:`${host}/live/${user}/${pass}/${c.stream_id}.m3u8`});});
        
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="flex";
        renderChannels(liveChannels);
        
        // التركيز على أول قناة بعد التحميل
        setTimeout(() => {
            const firstChannel = document.querySelector('.channel');
            if(firstChannel) firstChannel.focus();
        }, 500);

    }catch(e){alert("خطأ في الاتصال بالسيرفر"); console.log(e);}
}

async function refreshAccount(){if(host && user && pass){xtreamLogin();}}

async function loadM3U(){
    let url=document.getElementById("m3u").value;
    if(!url)return;
    try{
        let res=await fetch(url);
        let text=await res.text();
        let lines=text.split("\n");
        liveChannels=[]; movies=[]; series=[];
        for(let i=0; i<lines.length; i++){
            if(lines[i].startsWith("#EXTINF")){
                let name=lines[i].split(",")[1] || "Unnamed";
                let logo="";
                let logoMatch=lines[i].match(/tvg-logo="(.*?)"/);
                if(logoMatch) logo=logoMatch[1];
                let link=lines[i+1];
                if(link) liveChannels.push({name:name.trim(), logo:logo, url:link.trim()});
            }
        }
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="flex";
        renderChannels(liveChannels);
        
        setTimeout(() => {
            const firstChannel = document.querySelector('.channel');
            if(firstChannel) firstChannel.focus();
        }, 500);
    }catch(e){alert("فشل تحميل M3U"); console.log(e);}
}

function renderChannels(list){
    const box=document.getElementById("channels");
    box.innerHTML="";
    (list||liveChannels).forEach(c=>{
        const div=document.createElement("div");
        div.className="channel";
        div.setAttribute("tabindex", "0"); // مهم جداً للتنقل بالريموت
        div.innerHTML=`<img src="${c.logo || 'https://via.placeholder.com/150x100?text=TV'}"><span>${c.name}</span>`;
        
        // دعم النقر بالماوس (للتجارب) أو زر الموافقة بالريموت
        div.onclick = () => playStream(c.url);
        
        // تفعيل التنقل التلقائي للمشاهدة
        div.addEventListener('focus', function() {
            div.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        box.appendChild(div);
    });
}

function playStream(url){
    const video=document.getElementById("video");
    video.pause(); video.src="";
    if(url.includes(".m3u8") && Hls.isSupported()){
        let hls=new Hls(); hls.loadSource(url); hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
    } else if(url.includes(".mpd")){
        dashjs.MediaPlayer().create().initialize(video, url, true);
    } else {
        video.src=url;
        video.play();
    }
    // التركيز على مشغل الفيديو للتحكم به بالريموت
    video.focus();
}

function searchAll(){
    const text=document.getElementById("search").value.toLowerCase();
    let results=[...liveChannels,...movies,...series].filter(c=>c.name.toLowerCase().includes(text));
    renderChannels(results);
}

function loadLive(){ renderChannels(liveChannels); }
function loadMovies(){ alert("قسم الأفلام جاهز لإضافة M3U/JSON"); }
function loadSeries(){ alert("قسم المسلسلات جاهز لإضافة M3U/JSON"); }

function changeQuality(q){ currentQuality=q; alert("تم تغيير الجودة إلى: "+q); }
function muteToggle(){ const video=document.getElementById("video"); video.muted=!video.muted; }
</script>

</body>
</html>
